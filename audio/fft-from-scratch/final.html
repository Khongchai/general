<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background: #111;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      canvas {
        border: 1px solid #444;
        margin-top: 20px;
        width: 200px;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <canvas id="spectrogramCanvas"></canvas>
  </body>
  <script>
    // @ts-check

    // Exercise, write an fft function that, given an array of audio input in time domain, outputs
    // complex numbers Array<{real: number, imaginary: number}>

    async function main() {
      const { data: audioData, sampleRate } = await (async () => {
        const got = await fetch("../a.wav").then((response) =>
          response.arrayBuffer(),
        );
        const audioContext = new AudioContext();
        const decodedAudio = await audioContext.decodeAudioData(got);
        const data = decodedAudio.getChannelData(0); // audio is mono
        return { data, sampleRate: decodedAudio.sampleRate };
      })();

      const windowSize = 1024;
      /** @type {Float32Array[]} */
      const chunks = [];
      for (let i = 0; i < audioData.length; i += windowSize) {
        const sliced = audioData.slice(i, i + windowSize);
        chunks.push(sliced);
      }

      /**
       * @type {Array<{real: number, imaginary: number}>[]}
       */
      const outputs = [];

      for (const chunk of chunks) {
        /**
         * @type {Array<{real: number, imaginary: number}>}
         */
        const store = [];
        for (let k = 0; k < windowSize; k++) {
          const result = { imaginary: 0, real: 0 };
          for (let n = 0; n < windowSize; n++) {
            const angle = 2 * Math.PI * (n / windowSize) * k;
            const cos = chunk[n] * Math.cos(angle);
            const sin = -chunk[n] * Math.sin(angle);
            result.real += cos;
            result.imaginary += sin;
          }

          store.push(result);
        }
        outputs.push(store);
      }

      return outputs;
    }

    void main().then((result) => {
      renderSpectrogram(result);
    });

    function renderSpectrogram(outputs) {
      /** @type {HTMLCanvasElement} */
      const canvas = document.getElementById("spectrogramCanvas");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;

      // Clear canvas
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, width, height);

      const numChunks = outputs.length;
      const numBins = outputs[0].length / 2; // Only use the first half (Nyquist)

      const cellWidth = width / numChunks;
      const cellHeight = height / numBins;

      outputs.forEach((bins, timeIdx) => {
        bins.slice(0, numBins).forEach((bin, freqIdx) => {
          // Calculate magnitude
          const magnitude = Math.sqrt(bin.real ** 2 + bin.imaginary ** 2);

          // Simple log-ish scaling for visibility
          const intensity = Math.min(255, magnitude * 50);

          ctx.fillStyle = `rgb(${intensity}, ${intensity * 0.5}, ${intensity * 0.2})`;

          // Draw from bottom to top (low freq at bottom)
          ctx.fillRect(
            timeIdx * cellWidth,
            height - freqIdx * cellHeight,
            cellWidth + 1, // +1 to avoid sub-pixel gaps
            cellHeight + 1,
          );
        });
      });
    }
  </script>
</html>
