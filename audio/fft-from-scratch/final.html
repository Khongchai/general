  <script>
    // @ts-check

    // Exercise, write an fft function that, given an array of audio input in time domain, outputs
    // complex numbers Array<{real: number, imaginary: number}>

    async function main() {
      const { data: audioData, sampleRate } = await (async () => {
        const got = await fetch("../a.wav").then((response) =>
          response.arrayBuffer(),
        );
        const audioContext = new AudioContext();
        const decodedAudio = await audioContext.decodeAudioData(got);
        const data = decodedAudio.getChannelData(0); // audio is mono
        return { data, sampleRate: decodedAudio.sampleRate };
      })();

      const windowSize = 1024;
      /** @type {Float32Array[]} */
      const chunks = [];
      for (let i = 0; i < audioData.length; i += windowSize) {
        const sliced = audioData.slice(i, i + windowSize);
        chunks.push(sliced);
      }

      /**
       * @type {Array<{real: number, imaginary: number}>[]}
       */
      const outputs = [];

      for (const chunk of chunks) {
        /**
         * @type {Array<{real: number, imaginary: number}>}
         */
        const store = [];
        const frequencyBins = sampleRate / windowSize;
        for (let k = 0; k < windowSize; k++) {
          const result = { imaginary: 0, real: 0 };
          for (let n = 0; n < windowSize; n++) {
            const angle = 2 * Math.PI * (n / windowSize) * k;
            const cos = chunk[n] * Math.cos(angle);
            const sin = -chunk[n] * Math.sin(angle);
            result.real += cos;
            result.imaginary += sin;
          }

          store.push(result);
        }
        outputs.push(store);
      }

      return outputs;
    }

    void main().then((result) => {
      const flat = result.flat();
      console.log(flat);
      // TODO render spectogram
    });
  </script>
