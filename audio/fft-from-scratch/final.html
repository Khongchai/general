<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
  <script>
    // @ts-check

    // Exercise, write an fft function that, given an array of audio input in time domain, outputs
    // complex numbers Array<{real: number, imaginary: number}>

    async function main() {
      const { data: audioData, sampleRate } = await (async () => {
        const got = await fetch("../a.wav").then((response) =>
          response.arrayBuffer(),
        );
        const audioContext = new AudioContext();
        const decodedAudio = await audioContext.decodeAudioData(got);
        const data = decodedAudio.getChannelData(0); // audio is mono
        return { data, sampleRate: decodedAudio.sampleRate };
      })();

      const windowSize = 1024;
      /** @type {Float32Array[]} */
      const chunks = [];
      for (let i = 0; i < audioData.length; i += windowSize) {
        const sliced = audioData.slice(i, i + windowSize);
        chunks.push(sliced);
      }

      /**
       * @type {Array<{real: number, imaginary: number}>[]}
       */
      const outputs = [];

      for (const chunk of chunks) {
        /**
         * @type {Array<{real: number, imaginary: number}>}
         */
        const store = [];
        const frequencies = sampleRate / windowSize;
        for (let k = 0; k < sampleRate; k += frequencies) {
          // let's skip audioData.length / 2 nyquist optimization for now.
          const result = { imaginary: 0, real: 0 };
          for (let n = 0; n < audioData.length; n++) {
            const angle = 2 * Math.PI * (n / windowSize) * k;
            const cos = chunk[n] * Math.cos(angle);
            const sin = -chunk[n] * Math.sin(angle);
            result.real += cos;
            result.imaginary += sin;
          }

          store.push(result);
        }
        outputs.push(store);
      }

      return outputs;
    }

    void main().then((result) => {
      renderSpectrogram(result);
    });

    /**
     * @param {Array<{real: number, imaginary: number}>[]} data
     */
    function renderSpectrogram(data) {
      const canvas = /** @type {HTMLCanvasElement} */ (
        document.getElementById("spectrogramCanvas")
      );
      const ctx = canvas.getContext("2d");
      if (!ctx || data.length === 0) return;

      const numChunks = data.length;
      const numBins = data[0].length / 2;

      canvas.width = numChunks;
      canvas.height = numBins;

      const imageData = ctx.createImageData(canvas.width, canvas.height);

      for (let x = 0; x < numChunks; x++) {
        for (let y = 0; y < numBins; y++) {
          const complex = data[x][y];

          const magnitude = Math.sqrt(
            complex.real ** 2 + complex.imaginary ** 2,
          );

          const intensity = Math.min(255, magnitude * 10);

          const pixelIndex = ((numBins - 1 - y) * numChunks + x) * 4;

          // rgba
          imageData.data[pixelIndex] = intensity;
          imageData.data[pixelIndex + 1] = intensity;
          imageData.data[pixelIndex + 2] = intensity;
          imageData.data[pixelIndex + 3] = 255;
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }
  </script>
</html>
