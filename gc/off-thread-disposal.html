<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #eee;
        font-family: monospace;
        overflow: hidden;
      }
      #hud {
        position: fixed;
        right: 0;
        width: fit-content;
        z-index: 10;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 12px;
        border-radius: 6px;
      }
      #fps {
        font-size: 22px;
        font-weight: bold;
      }
      button {
        font-family: monospace;
        font-size: 13px;
        padding: 6px 10px;
        margin-top: 6px;
        cursor: pointer;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <button id="toggle">start GC stress</button>
      <button id="mode">dispose: in worker</button>
    </div>
    <canvas id="c"></canvas>

    <script>
      // @ts-check
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const fpsEl = document.getElementById("fps");
      const statsEl = document.getElementById("stats");
      const toggleBtn = document.getElementById("toggle");
      const modeBtn = document.getElementById("mode");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      // ---- Dumb GC worker ----
      // It receives the transferred buffers and does nothing with them. The
      // hypothesis: once transferred, the buffers live on the worker's heap, so
      // the cost of collecting them is paid off the main thread.
      const workerSrc = `
        let received = 0;
        self.onmessage = (e) => {
          // "e.data" is the array of (now-detached-on-main) Float64Arrays.
          // Do nothing -> let them go out of scope so the worker GC reaps them.
          received += e.data.length;
          // Drop the reference immediately.
          e.data = null;
        };
      `;
      const worker = new Worker(
        URL.createObjectURL(new Blob([workerSrc], { type: "text/javascript" })),
      );

      // ---- GC stress: allocate + immediately drop large Float64Arrays ----
      let stressOn = false;
      // true  -> transfer buffers to the worker (collect off-thread)
      // false -> drop the array on the main thread (collect on main thread)
      let disposeInWorker = true;

      // 1,000,000 float64 = 8 MB per array. Allocating many per frame and dropping
      // them forces the allocator to churn and triggers major GC pauses.
      const ARRAY_LEN = 1_000_000;

      function stressAllocate() {
        if (!stressOn) return;
        let bigs = [];
        for (let i = 0; i < 300; i++) {
          // only drop after 20 iteration to guarantee
          // it is moved to the old space.
          if (bigs.length > 20) {
            if (disposeInWorker) {
              // hand the buffers off to the worker via transfer -> they are
              // detached on the main thread and become the worker's problem.
              worker.postMessage(
                bigs,
                bigs.map((x) => x.buffer),
              );
            }

            // dropping the reference (either way) lets it be collected.
            bigs = [];
          }
          // create large array
          const big = new Float64Array(ARRAY_LEN);
          big[0] = i;
          big[ARRAY_LEN - 1] = i;

          if (Math.random() < 100) {
            bigs.push(big);
            continue;
          }
        }
      }

      toggleBtn.addEventListener("click", () => {
        stressOn = !stressOn;
        toggleBtn.textContent = stressOn ? "stop GC stress" : "start GC stress";
      });

      modeBtn.addEventListener("click", () => {
        disposeInWorker = !disposeInWorker;
        modeBtn.textContent = disposeInWorker
          ? "dispose: in worker"
          : "dispose: in main";
      });

      // ---- Animated circle bouncing left<->right ----
      const radius = 30;
      let x = radius;
      let dir = 1;
      const speed = 600; // px per second — frame-rate independent so stutter is visible

      let lastTime = performance.now();
      let lastFrameTime = lastTime;

      function frame(now) {
        const dt = (now - lastFrameTime) / 1000;
        lastFrameTime = now;

        // run the GC stress workload (if enabled) every frame on the main thread
        stressAllocate();

        x += dir * speed * dt;
        if (x > canvas.width - radius) {
          x = canvas.width - radius;
          dir = -1;
        }
        if (x < radius) {
          x = radius;
          dir = 1;
        }

        // draw
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.arc(x, canvas.height / 2, radius, 0, Math.PI * 2);
        ctx.fillStyle = stressOn ? "#ff5252" : "#52ff9e";
        ctx.fill();

        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
